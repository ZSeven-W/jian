# cargo-deny config — Plan 22 (action-surface) Task 10 Job 2.
#
# This file is the workspace-wide ban list. The headline ban targets
# are `jian-asp` and `pen-mcp`: production hosts MUST NOT pull either
# into their dependency graph. The complementary `cargo tree` job
# (Plan 22 Task 10 Job 1) tests the realised graph; this file tests
# the *declared* dependency edges so a banned crate can't sneak in
# under any future feature combination.
#
# Run locally:
#     cargo deny check bans
#
# CI: `.github/workflows/ci-action-surface-isolation.yml::deny`.

[graph]
# Check the host targets explicitly so platform-conditional deps are
# evaluated. Linux + macOS + Windows cover the three desktop matrices
# the runtime ships against today; iOS / Android / WASM hosts get
# added when their crates land (Plan 8 / 11).
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
    { triple = "x86_64-pc-windows-msvc" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]

# Why no `[graph] exclude` and why NOT `--workspace`: cargo-deny's
# `exclude` removes a crate AND all edges leading to it, which would
# silently bypass the ban below in a regression where a host
# non-optionally depends on `jian-asp`. The workflow instead invokes
# cargo-deny with `--no-default-features --features <production-set>
# -p <host>` so the analysis is rooted at the host (not the
# workspace), `jian-asp` only appears if it's actually reachable from
# the host's production-feature graph, and the ban triggers exactly
# when that reachability becomes real. See
# `.github/workflows/ci-action-surface-isolation.yml::cargo-deny`.
all-features = false

[advisories]
# Action Surface plan doesn't mandate vulnerability gating in Phase 1
# (separate concern). Switch to `db = "..."` + `vulnerability = "deny"`
# once a security review cadence is set.
yanked = "warn"

[licenses]
# Plan 22 Task 10 doesn't require license gating. Set when needed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "Zlib",
    "0BSD",
    "CC0-1.0",
]
confidence-threshold = 0.93

[bans]
# `multiple-versions = "warn"` (default `deny` is too noisy in a
# winit-heavy graph; keep visibility without breaking PRs).
multiple-versions = "warn"
# `wildcards = "allow"` because this isolation gate is purely about
# banning specific crates from production hosts (see [[bans.deny]]
# below). The wildcard lint flags any `foo = "*"`-shaped Cargo.toml
# entry, which is mainly a publish-hygiene concern; cargo-deny's
# `allow-wildcard-paths` escape hatch only applies to crates marked
# `publish = false`, which our workspace crates aren't, so we'd
# false-positive on every internal path dep. Workspace publish
# hygiene is a separate concern; if it ever matters, run cargo-deny
# from a different config rather than entangling it here.
wildcards = "allow"

# ─── Headline bans (Plan 22 Task 10 Job 2) ───────────────────────────
#
# `jian-asp` is the dev-only Agent Shell Protocol crate. It exposes
# generic UI verbs (`tap`/`find`/`inspect`/`snapshot`) that would be
# a structural information leak in production (threat model T1).
# Plan 18 Task 0 puts the entire crate behind `#[cfg(feature =
# "dev-asp")]`. This ban catches any future host or transitive dep
# that adds `jian-asp` without going through the `dev-asp` feature
# passthrough.
#
# `pen-mcp` is OpenPencil's editor-side MCP server. It carries the
# 50+ element tools (`batch_design`, `add_*_v0`, `inspect_ax_tree`,
# `snapshot_png`, etc.) that completely dump the document. It must
# never enter a production runtime. Even though `pen-mcp` lives in
# the OpenPencil repo and isn't reachable from the Jian workspace
# today, this ban is preemptive — when the OP→Jian Rust unification
# (Plan 19 / Stage D) starts, `pen-mcp` becomes a path-dep candidate
# and the gate must already exist.
# Both bans are unconditional. cargo-deny only inspects the realised
# dep graph for the workspace's **default features**; jian-host-desktop
# wires `jian-asp` as an `optional = true` dep activated solely by the
# `dev-asp` feature, which is NOT in any host's default set, so
# `jian-asp` never appears in the default-feature graph and the ban
# is silently satisfied. If a future PR drops the `optional = true`
# (or otherwise makes `jian-asp` reachable from default features),
# this ban triggers and the PR fails — which is exactly what we want.
#
# We deliberately do **not** allowlist host crates as `wrappers`:
# - cargo-deny errors on unused wrappers in default-feature workspace
#   runs (when `dev-asp` is off the wrapper is never exercised),
# - and the dev-asp-enabled feature path is verified separately by
#   Plan 22 Task 10 Job 1 (`cargo tree`), so no wrapper is needed
#   structurally.
[[bans.deny]]
name = "jian-asp"

# `pen-mcp` lives in the OpenPencil repo and isn't reachable from
# Jian's workspace. The ban is preemptive — when the OP→Jian Rust
# unification (Stage D) brings `pen-mcp` into a shared workspace,
# the gate must already be in place; any host attempting to
# pull `pen-mcp` in trips here.
[[bans.deny]]
name = "pen-mcp"

[sources]
# No git-source deps allowed without explicit allowlist; the workspace
# uses path deps + crates.io.
unknown-git = "deny"
unknown-registry = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

[package]
name         = "jian-host-desktop"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
authors      = { workspace = true }
description  = "winit-based desktop host for the Jian runtime"

[features]
# Default = pure-function translators + in-memory services. No winit
# event loop is started unless a `run` helper is called, and no
# platform-specific surface feature is picked up automatically so CI
# stays windowless. **`dev-asp` deliberately stays out of `default`**
# so production release builds don't link `jian-asp` (Plan 18 Task 0
# physical isolation; Plan 22 Task 10 CI assertion tests this).
default = []

# Dev-only Agent Shell Protocol (Plan 18). Pulls in `jian-asp` and
# enables the verb dispatch / transport plumbing once Phase 1 of the
# ASP plan lands. Production hosts MUST NOT enable this feature; the
# CI isolation job (`ci-action-surface-isolation.yml`) fails any PR
# whose `cargo tree` for a release host includes `jian-asp`.
dev-asp = ["dep:jian-asp", "jian-asp/dev-asp"]

# Opt-in to the real event-loop run helper. Pulls in `softbuffer` for
# CPU-side pixel presentation (no per-platform GPU context needed).
run = ["dep:softbuffer"]

# Native OS feature flags for the optional integrations (added when
# the implementations land):
clipboard = ["dep:arboard"]
# `reqwest::blocking::Client`-backed `NetworkClient`. Off by default so
# the headless / CI fast path doesn't pull in TLS + the reqwest
# dependency tree. Activate this for any host that exposes the
# runtime's `http_request` action. (WebSocket support stays on
# `connect_websocket`'s default `Err(...)` path until a follow-up
# wires `tokio-tungstenite`.)
network = ["dep:reqwest"]
# `rfd::MessageDialog`-backed `FeedbackSink + AsyncFeedback`. Off by
# default ‚Äî enables the `toast` / `alert` / `confirm` actions on
# desktop. `rfd` 0.14 wraps platform-native dialogs (NSAlert /
# Win32 / GTK / KDE) without bundling its own widget toolkit.
feedback = ["dep:rfd"]
# Generic GitHub-Releases-backed `Updater` impl over `self_update`.
# Off by default ‚Äî `self_update` pulls in `reqwest` (rustls) +
# `zip` / `tar` decoders. Sparkle (macOS) and AppImageUpdate (Linux)
# remain trait-level deferred; this feature ships a portable
# replacement that's good enough for shipping while the per-platform
# backends mature.
updater = ["dep:self_update"]
# Native menus via `muda` ‚Äî cross-platform (macOS / Windows / Linux).
# Phase 1 ships a pure menu *spec* (`MenuSpec`) so authors can
# declare File / Edit / View entries; the actual `muda::Menu`
# wiring activates when the host opens its window. Pulled in
# under a feature flag because the shared library footprint isn't
# needed for headless / CI builds.
menus = ["dep:muda"]

# AI Action Surface integration. Wires `jian-action-surface`'s
# `Bridge::Drain` into the run-loop's per-frame `about_to_wait` tick:
# each pending MCP request is serviced against an `ActionSurface`
# refreshed on every hot-reload. Off by default ‚Äî only `jian dev
# --mcp` (or a host author who explicitly opts in) pulls in the
# rmcp/tokio shared libs.
mcp = ["dep:jian-action-surface"]

# Real-shaping text measurement via `jian-skia::SkiaMeasure`. When on,
# `DesktopHost::with_skia_measure()` (and `install_skia_measure`) swap
# the runtime's `MeasureBackend` to the Skia paragraph shaper, so
# layout sees the same widths the renderer paints ‚Äî fixes CJK / emoji
# undercounts and per-segment style mismatches that the default
# `EstimateBackend` glosses over. Off by default ‚Äî pulls in
# skia-safe's textlayout feature (ICU + HarfBuzz, ~15 MB).
textlayout = ["jian-skia/textlayout"]

[dependencies]
jian-core       = { path = "../jian-core" }
jian-ops-schema = { path = "../jian-ops-schema" }
jian-skia       = { path = "../jian-skia" }
jian-action-surface = { path = "../jian-action-surface", optional = true, features = ["mcp"] }
jian-asp        = { path = "../jian-asp", optional = true, default-features = false }
winit           = "0.30"
async-trait     = "0.1"
serde           = { workspace = true }
serde_json      = { workspace = true }
arboard         = { version = "3", optional = true }
softbuffer      = { version = "0.4", optional = true }
muda            = { version = "0.13", optional = true }
reqwest         = { version = "0.12", optional = true, default-features = false, features = ["rustls-tls", "json", "gzip", "blocking"] }
rfd             = { version = "0.14", optional = true }
self_update     = { version = "0.41", optional = true, default-features = false, features = ["rustls", "compression-flate2", "compression-zip-deflate"] }

# macOS-only: drive `NSApp.setApplicationIconImage:` so the runtime can
# update the Dock icon for unbundled binaries (winit's `set_window_icon`
# is a no-op on macOS ‚Äî the Dock icon comes from the .app bundle's
# .icns by default; we override it from the schema's `app.icon` PNG).
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5"
objc2-app-kit = { version = "0.2", features = ["NSApplication", "NSImage"] }
objc2-foundation = { version = "0.2", features = ["NSData", "NSString"] }

[dev-dependencies.futures]
version = "0.3"

[[bin]]
name = "jian-player"
path = "src/bin/jian-player.rs"

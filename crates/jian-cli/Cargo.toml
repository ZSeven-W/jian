[package]
name         = "jian"
version      = { workspace = true }
edition      = { workspace = true }
rust-version = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
authors      = { workspace = true }
description  = "Command-line toolchain for the Jian runtime (.op files)"

[features]
# Default enables the `player` subcommand, which pulls in the winit
# event loop + softbuffer via jian-host-desktop's `run` feature.
# Disable for a headless-only build (`cargo build --no-default-features`).
default = ["player"]
player  = ["dep:jian-host-desktop"]

[dependencies]
jian-core        = { path = "../jian-core" }
jian-ops-schema  = { path = "../jian-ops-schema" }
jian-host-desktop = { path = "../jian-host-desktop", optional = true, features = ["run"] }
clap             = { version = "4", features = ["derive"] }
anyhow           = "1"
serde            = { workspace = true }
serde_json       = { workspace = true }
zip              = { version = "2.2", default-features = false, features = ["deflate"] }

[dev-dependencies]
assert_cmd      = "2"
predicates      = "3"
tempfile        = "3"

[[bin]]
name = "jian"
path = "src/main.rs"
